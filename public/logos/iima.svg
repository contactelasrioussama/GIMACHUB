<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="International Islamic Marketing Association">
  <!-- Background: transparent -->
  <!-- Green crescent motif -->
  <g transform="translate(10, 8)">
    <!-- Outer circle (crescent base) -->
    <circle cx="32" cy="32" r="30" fill="#1a6b3c"/>
    <!-- Inner circle to create crescent -->
    <circle cx="40" cy="26" r="24" fill="white"/>
    <!-- Small star inside crescent -->
    <polygon points="20,30 22.5,23 25,30 32,30 26.5,34.5 28.5,41.5 22.5,37 16.5,41.5 18.5,34.5 13,30" fill="white" transform="translate(-1, 2)"/>
  </g>
  <!-- Organization name -->
  <text x="78" y="28" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#1a6b3c" letter-spacing="0.5">INTERNATIONAL ISLAMIC</text>
  <text x="78" y="47" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#1a6b3c" letter-spacing="0.5">MARKETING ASSOCIATION</text>
  <!-- Acronym -->
  <text x="78" y="66" font-family="Arial, sans-serif" font-size="11" fill="#555" letter-spacing="3">I  I  M  A</text>
</svg>
